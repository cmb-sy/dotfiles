name: CI

on:
  workflow_dispatch:
  push:
  pull_request:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  dotfile-test:
    name: Install + verify
    timeout-minutes: 60
    runs-on: macOS-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dotfiles
        run: CI=true ./setup/setup.zsh

      # ----------------------------------------------------------
      # Step 1: Symlink verification
      # setup.zsh が dotfiles へのリンクを正しく貼れたかを構造的に検証する。
      # ここを抜くと「setup 完走したのにリンク欠落」というサイレント故障が漏れる。
      # ----------------------------------------------------------
      - name: Verify shell config symlinks
        run: |
          set -e
          for f in .zshrc .zshenv .aliases.sh .function.zsh .gitignore_global; do
            if [[ ! -L "$HOME/$f" ]]; then
              echo "FAIL: ~/$f is not a symlink"
              exit 1
            fi
          done
          echo "OK: shell config symlinks"

      - name: Verify Claude Code symlinks
        run: |
          set -e
          if [[ ! -L "$HOME/.claude" ]]; then
            echo "FAIL: ~/.claude is not a symlink"
            exit 1
          fi
          for asset in CLAUDE.md agents hooks settings.json skills statusline.sh; do
            if [[ ! -L "$HOME/.claude-work/$asset" ]]; then
              echo "FAIL: ~/.claude-work/$asset is not a symlink"
              exit 1
            fi
            if [[ ! -e "$HOME/.claude/$asset" ]]; then
              echo "FAIL: ~/.claude/$asset is not reachable"
              exit 1
            fi
          done
          echo "OK: Claude Code symlinks"

      - name: Verify .config symlinks
        run: |
          set -e
          for d in wezterm ghostty; do
            if [[ ! -L "$HOME/.config/$d" ]]; then
              echo "FAIL: ~/.config/$d is not a symlink"
              exit 1
            fi
          done
          echo "OK: .config symlinks"

      - name: Verify legacy bad symlinks are absent
        run: |
          set -e
          # 旧 setup.zsh が誤って作っていた symlink が再生していないことを確認。
          # 特に ~/.git は git の動作を壊すので絶対に存在してはならない。
          for bad in .Brewfile .bin .docs .git .macos; do
            if [[ -L "$HOME/$bad" ]]; then
              echo "FAIL: legacy symlink ~/$bad still exists (setup.zsh should not create this)"
              exit 1
            fi
          done
          echo "OK: no legacy bad symlinks"

      # ----------------------------------------------------------
      # Step 2: Brewfile formula commands are on PATH
      # Brewfile に列挙した formula が実際に PATH から呼べるかを検証。
      # cask は CI runner の制約で起動検証ができないため、ここでは formula のみ。
      # ----------------------------------------------------------
      - name: Verify Brewfile formulas
        run: |
          set -e
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          for cmd in gh jq fd fzf sheldon starship uv yarn git mise tmux linear; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              echo "FAIL: $cmd not on PATH"
              exit 1
            fi
          done
          echo "OK: Brewfile formulas on PATH"

      # ----------------------------------------------------------
      # Step 3: Claude skills inventory
      # claude/skills/*/SKILL.md の数が期待値以上あること。
      # 期待値は将来増えるので「最低 20」と緩めにする。減ったら故障扱い。
      # ----------------------------------------------------------
      - name: Verify Claude skills loadable
        run: |
          set -e
          count=$(find -L "$HOME/.claude/skills" -maxdepth 2 -name SKILL.md 2>/dev/null | wc -l | tr -d ' ')
          echo "Skills found: $count"
          if [[ "$count" -lt 20 ]]; then
            echo "FAIL: expected at least 20 SKILL.md, found $count"
            exit 1
          fi
          echo "OK: $count skills present"

      # ----------------------------------------------------------
      # Step 4: settings.json is valid JSON
      # 設定ファイルの構文エラーで Claude Code 起動を壊さないように。
      # ----------------------------------------------------------
      - name: Verify settings.json is valid JSON
        run: |
          set -e
          jq empty "$HOME/.claude/settings.json"
          echo "OK: settings.json is valid JSON"

      # ----------------------------------------------------------
      # Step 5: SKILL.md frontmatter sanity
      # 各 SKILL.md が `name:` フィールドを持つ最低限の構造であることを検証。
      # ----------------------------------------------------------
      - name: Verify SKILL.md frontmatter
        run: |
          set -e
          missing=0
          while IFS= read -r f; do
            if ! head -10 "$f" | grep -q '^name:'; then
              echo "FAIL: $f missing 'name:' in frontmatter"
              missing=$((missing + 1))
            fi
          done < <(find -L "$HOME/.claude/skills" -maxdepth 2 -name SKILL.md)
          if [[ "$missing" -gt 0 ]]; then
            echo "FAIL: $missing SKILL.md files missing frontmatter"
            exit 1
          fi
          echo "OK: all SKILL.md have name: in frontmatter"
