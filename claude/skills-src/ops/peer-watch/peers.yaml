# Watch list of GitHub dotfiles maintainers
#
# Format:
#   peers: handles to watch, one per line
#   overrides: owner/name only for repos that differ from the default <handle>/dotfiles
#
# To add someone, append the handle to peers. Add an overrides entry only if
# the repo name differs from the default.

peers:
  - neko-neko    # Tokyo; traditional tmux/Tailscale/sesh stack. Similar-scale local baseline
  - mizchi       # three-layer chezmoi + Nix home-manager + APM; pkfire/secretlint pre-push
  - joshukraine  # Claude Code skills organized via _shared/house-style.html + publish-artifact.sh
  - shunk031     # Japanese dev; AGENTS.md SSOT + symlinks serving Claude/Codex/Gemini together
  - yutkat       # 5,054 commits; version-tag releases; covers NixOS/Arch; bundled Codex prompts

overrides:
  mizchi: mizchi/chezmoi-dotfiles
