<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --brand: #139cab;
      --brand-dark: #0f7d89;
      --brand-soft: #e8f6f8;
      --ink: #1a1a1a;
      --ink-soft: #555;
      --ink-mute: #888;
      --bg: #fff;
      --bg-soft: #f5f5f5;
      --border: #d8d8d8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.7;
    }
    body { padding: 40px 56px 120px; max-width: 1024px; margin: 0 auto; }
    header { border-bottom: 2px solid var(--brand); padding-bottom: 16px; margin-bottom: 32px; }
    header h1 { color: var(--brand-dark); margin: 0 0 8px; font-size: 26px; font-weight: 700; }
    header .meta { color: var(--ink-mute); font-size: 13px; }
    section { margin-bottom: 32px; }
    section h2 {
      color: var(--brand-dark);
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    [contenteditable="true"] {
      border: 1px dashed transparent;
      padding: 6px 10px;
      border-radius: 3px;
      transition: border-color 0.15s;
    }
    [contenteditable="true"]:hover { border-color: var(--border); }
    [contenteditable="true"]:focus { border-color: var(--brand); outline: none; }
    [contenteditable="true"][data-placeholder]:empty::before {
      content: attr(data-placeholder);
      color: var(--ink-mute);
    }
    ul { padding-left: 22px; margin: 0; }
    ul li { margin-bottom: 4px; }
    #meeting-notes { background: var(--bg-soft); padding: 16px 20px; border-radius: 4px; }
    #meeting-notes [contenteditable="true"] { min-height: 80px; }
    #toolbar {
      position: fixed; bottom: 16px; right: 16px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      padding: 8px 10px; display: flex; gap: 6px; z-index: 999;
    }
    #toolbar button {
      font: inherit; font-size: 13px; padding: 6px 12px; border: 1px solid var(--brand); background: var(--bg);
      color: var(--brand); border-radius: 3px; cursor: pointer;
    }
    #toolbar button:hover { background: var(--brand-soft); }
    #toolbar button.primary { background: var(--brand); color: var(--bg); }
    #toolbar button.primary:hover { background: var(--brand-dark); }
    body.preview [contenteditable] { border-color: transparent !important; }
    @media print {
      #toolbar { display: none; }
      body { padding: 20px; max-width: none; }
      [contenteditable="true"] { border-color: transparent !important; padding: 0 !important; }
      [contenteditable="true"][data-placeholder]:empty::before { content: ""; }
      #meeting-notes { background: transparent; padding: 12px; border: 1px solid var(--border); border-radius: 0; }
      section { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <div class="meta">{{DATE}}</div>
  </header>

  <section id="summary">
    <h2>1. サマリー</h2>
    <div contenteditable="true">{{SUMMARY_BODY}}</div>
  </section>

  <section id="activities">
    <h2>2. やったこと</h2>
    <ul contenteditable="true">{{ACTIVITIES_ITEMS}}</ul>
  </section>

  <section id="next-actions">
    <h2>3. 残課題・次のアクション</h2>
    <ul contenteditable="true">{{NEXT_ACTIONS_ITEMS}}</ul>
  </section>

  <section id="confirmations">
    <h2>4. 確認事項</h2>
    <ul contenteditable="true">{{CONFIRMATIONS_ITEMS}}</ul>
  </section>

  <section id="meeting-notes">
    <h2>5. 打ち合わせメモ</h2>
    <div contenteditable="true" data-placeholder="ここに打ち合わせ中のメモを書き込めます"></div>
  </section>

  <aside id="toolbar">
    <button id="toggle-edit" type="button">編集モード: ON</button>
    <button id="export-pdf" type="button" title="ブラウザの印刷ダイアログから『PDF として保存』を選んでください">PDF として保存</button>
    <button id="save-html" type="button" class="primary">HTML として保存</button>
  </aside>

  <script>
    (function () {
      const toggleBtn = document.getElementById('toggle-edit');
      const pdfBtn = document.getElementById('export-pdf');
      const saveBtn = document.getElementById('save-html');
      let editing = true;

      function applyEditingState() {
        document.querySelectorAll('[contenteditable]').forEach(el => {
          el.setAttribute('contenteditable', String(editing));
        });
        document.body.classList.toggle('preview', !editing);
        toggleBtn.textContent = '編集モード: ' + (editing ? 'ON' : 'OFF');
      }

      toggleBtn.addEventListener('click', () => {
        editing = !editing;
        applyEditingState();
      });

      pdfBtn.addEventListener('click', () => {
        window.print();
      });

      function pad(n) { return String(n).padStart(2, '0'); }
      function timestamp() {
        const d = new Date();
        return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate())
          + '-' + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
      }

      saveBtn.addEventListener('click', () => {
        const clone = document.documentElement.cloneNode(true);

        // 編集 UI を除去
        const toolbar = clone.querySelector('#toolbar');
        if (toolbar) toolbar.remove();

        // contenteditable と placeholder を除去
        clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
        clone.querySelectorAll('[data-placeholder]').forEach(el => el.removeAttribute('data-placeholder'));

        // 編集用 <script> を除去 (このスクリプト自身)
        clone.querySelectorAll('script').forEach(s => s.remove());

        const html = '<!DOCTYPE html>\n' + clone.outerHTML;
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);

        const currentName = (location.pathname.split('/').pop() || 'report.html').replace(/\.html?$/i, '');
        const a = document.createElement('a');
        a.href = url;
        a.download = currentName + '-edited-' + timestamp() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      });
    })();
  </script>
</body>
</html>
