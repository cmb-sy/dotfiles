<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --brand: #139cab;
      --brand-dark: #0f7d89;
      --brand-deep: #083941;
      --brand-soft: #e8f6f8;
      --ink: #1a1a1a;
      --ink-soft: #555;
      --ink-mute: #888;
      --bg: #fff;
      --bg-soft: #f5f5f5;
      --border: #d8d8d8;
      --font-display: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.75;
    }
    body { padding: 48px 56px 140px; max-width: 1024px; margin: 0 auto; }

    header { position: relative; padding-bottom: 22px; margin-bottom: 44px; border-bottom: 1px solid var(--brand-deep); }
    header::after {
      content: "";
      position: absolute;
      left: 0; bottom: -5px;
      width: 72px; height: 4px;
      background: var(--brand);
    }
    header h1 {
      font-family: var(--font-display);
      color: var(--brand-deep);
      margin: 0 0 10px;
      font-size: 42px;
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: 0.01em;
    }
    header .meta {
      color: var(--ink-mute);
      font-size: 13px;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    main { counter-reset: section; }
    section {
      margin-bottom: 40px;
      padding-left: 18px;
      border-left: 4px solid var(--brand);
    }
    section h2 {
      counter-increment: section;
      display: flex;
      align-items: baseline;
      gap: 14px;
      font-family: var(--font-display);
      color: var(--brand-deep);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.01em;
      margin: 0 0 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }
    section h2::before {
      content: counter(section, decimal-leading-zero);
      flex-shrink: 0;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--brand-dark);
      background: var(--brand-soft);
      border-radius: 3px;
      padding: 4px 9px;
    }

    [contenteditable="true"] {
      border: 1px dashed transparent;
      padding: 6px 10px;
      border-radius: 3px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    [contenteditable="true"]:hover { border-color: var(--border); }
    [contenteditable="true"]:focus {
      border-color: var(--brand);
      outline: none;
      box-shadow: 0 0 0 3px var(--brand-soft);
    }
    [data-placeholder]:empty::before {
      content: attr(data-placeholder);
      color: var(--ink-mute);
    }
    ul { padding-left: 22px; margin: 0; }
    ul li { margin-bottom: 6px; }
    p { margin: 0 0 12px; }
    p:last-child { margin-bottom: 0; }

    table { border-collapse: collapse; width: 100%; margin: 4px 0 16px; font-size: 14.5px; }
    table:last-child { margin-bottom: 0; }
    th, td { border: 1px solid var(--border); padding: 9px 14px; text-align: left; }
    th { background: var(--brand-soft); color: var(--brand-deep); font-weight: 700; }
    tbody tr:nth-child(even) { background: var(--bg-soft); }

    #meeting-notes { background: var(--bg-soft); border: 1px dashed var(--border); padding: 18px 22px; border-radius: 6px; }
    #meeting-notes [contenteditable="true"] { min-height: 90px; }

    #toolbar {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; display: flex; gap: 8px; z-index: 999;
      box-shadow: 0 10px 28px rgba(10, 74, 82, 0.14), 0 2px 6px rgba(10, 74, 82, 0.08);
    }
    #toolbar button {
      font: inherit; font-size: 13px; font-weight: 600; padding: 8px 14px;
      border: 1px solid var(--brand); background: var(--bg);
      color: var(--brand-dark); border-radius: 6px; cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }
    #toolbar button:hover { background: var(--brand-soft); }
    #toolbar button:active { transform: translateY(1px); }
    #toolbar button:focus-visible { outline: 2px solid var(--brand-deep); outline-offset: 2px; }
    #toolbar button.primary { background: var(--brand-deep); color: #fff; border-color: var(--brand-deep); }
    #toolbar button.primary:hover { background: var(--brand-dark); }

    body.preview [contenteditable] { border-color: transparent !important; box-shadow: none !important; }

    @media (max-width: 640px) {
      body { padding: 32px 22px 150px; }
      header h1 { font-size: 27px; }
      section h2 { font-size: 20px; }
      #toolbar { left: 16px; right: 16px; bottom: 12px; justify-content: center; }

      table, thead, tbody, tr { display: block; }
      thead { display: none; }
      td { border: none; border-bottom: 1px solid var(--border); padding: 6px 4px; }
      td::before { content: attr(data-label); display: block; font-size: 11px; color: var(--ink-mute); font-weight: 700; }
      tr { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; }
    }

    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #toolbar { display: none; }
      body { padding: 24px; max-width: none; }
      [contenteditable] { border-color: transparent !important; box-shadow: none !important; padding: 0 !important; }
      [data-placeholder]:empty::before { content: ""; }
      #meeting-notes { background: transparent; border: 1px solid var(--border); padding: 14px; border-radius: 0; }
      section { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <div class="meta">{{DATE}}</div>
  </header>

  <main>
    <section id="summary">
      <h2>サマリー</h2>
      <div contenteditable="true">{{SUMMARY_BODY}}</div>
    </section>

    <section id="activities">
      <h2>やったこと</h2>
      <ul contenteditable="true">{{ACTIVITIES_ITEMS}}</ul>
    </section>

    <section id="next-actions">
      <h2>残課題・次のアクション</h2>
      <ul contenteditable="true">{{NEXT_ACTIONS_ITEMS}}</ul>
    </section>

    <section id="confirmations">
      <h2>確認事項</h2>
      <ul contenteditable="true">{{CONFIRMATIONS_ITEMS}}</ul>
    </section>

    <section id="meeting-notes">
      <h2>打ち合わせメモ</h2>
      <div contenteditable="true" data-placeholder="ここに打ち合わせ中のメモを書き込めます"></div>
    </section>
  </main>

  <aside id="toolbar">
    <button id="toggle-edit" type="button">編集モード: ON</button>
    <button id="export-pdf" type="button" title="ブラウザの印刷ダイアログから『PDF として保存』を選んでください">PDF として保存</button>
    <button id="save-html" type="button" class="primary">HTML として保存</button>
  </aside>

  <script>
    (function () {
      const toggleBtn = document.getElementById('toggle-edit');
      const pdfBtn = document.getElementById('export-pdf');
      const saveBtn = document.getElementById('save-html');
      let editing = true;

      function applyEditingState() {
        document.querySelectorAll('[contenteditable]').forEach(el => {
          el.setAttribute('contenteditable', String(editing));
        });
        document.body.classList.toggle('preview', !editing);
        toggleBtn.textContent = '編集モード: ' + (editing ? 'ON' : 'OFF');
      }

      toggleBtn.addEventListener('click', () => {
        editing = !editing;
        applyEditingState();
      });

      pdfBtn.addEventListener('click', () => {
        window.print();
      });

      function pad(n) { return String(n).padStart(2, '0'); }
      function timestamp() {
        const d = new Date();
        return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate())
          + '-' + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
      }

      saveBtn.addEventListener('click', () => {
        const clone = document.documentElement.cloneNode(true);

        // 編集 UI を除去
        const toolbar = clone.querySelector('#toolbar');
        if (toolbar) toolbar.remove();

        // contenteditable と placeholder を除去
        clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
        clone.querySelectorAll('[data-placeholder]').forEach(el => el.removeAttribute('data-placeholder'));

        // 編集用 <script> を除去 (このスクリプト自身)
        clone.querySelectorAll('script').forEach(s => s.remove());

        const html = '<!DOCTYPE html>\n' + clone.outerHTML;
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);

        const currentName = (location.pathname.split('/').pop() || 'report.html').replace(/\.html?$/i, '');
        const a = document.createElement('a');
        a.href = url;
        a.download = currentName + '-edited-' + timestamp() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      });
    })();
  </script>
</body>
</html>
