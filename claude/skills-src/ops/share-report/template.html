<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-soft: #555;
      --ink-mute: #888;
      --bg: #fff;
      --bg-soft: #f5f5f5;
      --border: #d8d8d8;
      --border-strong: #333;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.7;
    }
    body { padding: 40px 56px 120px; max-width: 880px; margin: 0 auto; }
    header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 32px; }
    header h1 { color: var(--ink); margin: 0 0 8px; font-size: 24px; font-weight: 600; }
    header .meta { color: var(--ink-mute); font-size: 13px; }
    section { margin-bottom: 32px; }
    section h2 {
      color: var(--ink);
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    [contenteditable="true"] {
      border: 1px dashed transparent;
      padding: 6px 10px;
      border-radius: 3px;
      transition: border-color 0.15s;
    }
    [contenteditable="true"]:hover { border-color: var(--border); }
    [contenteditable="true"]:focus { border-color: var(--border-strong); outline: none; }
    [contenteditable="true"][data-placeholder]:empty::before {
      content: attr(data-placeholder);
      color: var(--ink-mute);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid var(--border); padding: 10px 12px; vertical-align: top; text-align: left; }
    th { background: var(--bg-soft); color: var(--ink); font-weight: 600; width: 50%; font-size: 14px; }
    ul { padding-left: 22px; margin: 0; }
    ul li { margin-bottom: 4px; }
    #meeting-notes { background: var(--bg-soft); padding: 16px 20px; border-radius: 4px; }
    #meeting-notes [contenteditable="true"] { min-height: 80px; }
    #toolbar {
      position: fixed; bottom: 16px; right: 16px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      padding: 8px 10px; display: flex; gap: 6px; z-index: 999;
    }
    #toolbar button {
      font: inherit; font-size: 13px; padding: 6px 12px; border: 1px solid var(--border-strong); background: var(--bg);
      color: var(--ink); border-radius: 3px; cursor: pointer;
    }
    #toolbar button:hover { background: var(--bg-soft); }
    #toolbar button.primary { background: var(--border-strong); color: var(--bg); }
    #toolbar button.primary:hover { background: #1a1a1a; }
    body.preview [contenteditable] { border-color: transparent !important; }
    @media print {
      #toolbar { display: none; }
      body { padding: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <div class="meta">{{DATE}}</div>
  </header>

  <section id="summary">
    <h2>1. ご依頼のサマリと背景</h2>
    <div contenteditable="true">{{SUMMARY_BODY}}</div>
  </section>

  <section id="before-after">
    <h2>2. 実現したこと</h2>
    <table>
      <thead><tr><th>変更前 (Before)</th><th>変更後 (After)</th></tr></thead>
      <tbody contenteditable="true">{{BEFORE_AFTER_ROWS}}</tbody>
    </table>
  </section>

  <section id="next-actions">
    <h2>3. 残課題・次のアクション・確認事項</h2>
    <ul contenteditable="true">{{NEXT_ACTIONS_ITEMS}}</ul>
  </section>

  <section id="meeting-notes">
    <h2>4. 打ち合わせメモ</h2>
    <div contenteditable="true" data-placeholder="ここに打ち合わせ中のメモを書き込めます"></div>
  </section>

  <aside id="toolbar">
    <button id="toggle-edit" type="button">編集モード: ON</button>
    <button id="save-html" type="button" class="primary">保存して書き出し</button>
  </aside>

  <!-- JS は Task 3 で追加 -->
</body>
</html>
