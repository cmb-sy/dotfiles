# gain watch sources
# Add sources per section. gain watch reads this file to know what to observe.
# NOTE: empty sections scaffold as `key: []` with commented-out examples underneath.
# Before uncommenting an example, remove the `[]` from that key first —
# a key set to `[]` followed by uncommented `- ` list items is invalid YAML.

# dotfiles peers — adoption workflow targets (absorbed from peer-watch)
#   handles: GitHub handles to watch, one per line
#   overrides: owner/name only for repos differing from default <handle>/dotfiles
peers:
  handles:
    - neko-neko    # Tokyo; traditional tmux/Tailscale/sesh stack
    - mizchi       # three-layer chezmoi + Nix home-manager + APM
    - joshukraine  # Claude Code skills via _shared/house-style.html
    - shunk031     # AGENTS.md SSOT + symlinks for Claude/Codex/Gemini
    - yutkat       # version-tag releases; NixOS/Arch; bundled Codex prompts
  overrides:
    mizchi: mizchi/chezmoi-dotfiles

# General repos — watch commits/releases (not limited to dotfiles)
github:
  - repo: neko-neko/belt
    note: LLM-driven Agent Skills workflow engine; directly relevant to my skill ops
  - repo: mizchi/vibe-lang
    note: active experimental language for AI coding
  - repo: ollama/ollama
    note: releases only — new versions of the free local runtime behind Handy voice post-processing

# Service changelog / release pages
services:
  - name: Claude Code
    url: https://docs.anthropic.com/en/release-notes/claude-code
    note: primary daily tool; weekly feature drops
  - name: Anthropic API
    url: https://docs.anthropic.com/en/release-notes/api
    note: model/API updates; feeds Databricks & AI work
  - name: Obsidian
    url: https://obsidian.md/changelog
    note: vault workflow foundation

# Engineers to follow via blog (RSS) and SNS (best-effort)
engineers:
  - name: Simon Willison
    blog: https://simonwillison.net/atom/everything/
    note: LLM tooling practice; highest signal in the space
  - name: mizchi
    x: "@mizchi"
    blog: https://zenn.dev/mizchi/feed
    note: also watched in peers (dotfiles); Zenn is authoritative (mizchi.dev serves stale 2020 cache)

# Impact news — search queries
news:
  - query: "AI coding agent 新機能 比較"
    note: Claude Code / Cursor / Codex competitive landscape
  - query: "音声入力 コーディング dictation STT ツール"
    note: alternatives/new tools around Handy/Typeless workflow
  - query: "dotfiles 開発環境 ツール トレンド"
    note: dev-environment new practices
  - query: "開発者ツール 話題 トレンド"
    note: catch-all for whatever is trending
  - query: "ローカルLLM 小型モデル 日本語 Ollama 新モデル"
    note: successor candidates for qwen3:4b in Handy local voice mode (small, ja-capable, runs on Mac)
  - query: "small local LLM new model Ollama English instruct"
    note: en-mode candidates for Handy local voice (voice-switch en)
  - query: "AI coding agent harness ベストプラクティス CLAUDE.md 運用 構築"
    note: harness construction practices; feeds harness-audit Level 4 anchors
  - query: "agentic coding workflow harness best practices"
    note: EN sources for the same; top-engineer harness patterns
