#cloud-config
# Paste into "Advanced options > cloud-init script" when creating the OCI instance.
# Before pasting, replace {{TAILSCALE_AUTH_KEY}} with a single-use, expiring key
# issued at https://login.tailscale.com/admin/settings/keys.
# This file is a template: never save or commit a real key into it.
package_update: true
package_upgrade: true
packages:
  - git
  - zsh
  - curl
timezone: Asia/Tokyo
runcmd:
  # Join Tailscale (outbound-only; works with all inbound ports closed)
  - ['sh', '-c', 'curl -fsSL https://tailscale.com/install.sh | sh']
  - ['tailscale', 'up', '--authkey={{TAILSCALE_AUTH_KEY}}', '--ssh']
  # Fetch dotfiles (bootstrap is run manually after the first SSH)
  - ['sudo', '-u', 'ubuntu', 'git', 'clone', 'https://github.com/cmb-sy/dotfiles.git', '/home/ubuntu/dotfiles']
final_message: "cloud-init done. Connect via: tailscale ssh ubuntu@<hostname>"
