#cloud-config
# OCI インスタンス作成時に「高度なオプション > cloud-init スクリプト」へ貼り付ける。
# 貼り付け前に {{TAILSCALE_AUTH_KEY}} を使い捨てキー（単回使用・有効期限付き・
# https://login.tailscale.com/admin/settings/keys で発行）に置換すること。
# このファイル自体はテンプレであり、実キーを書き込んで保存・コミットしてはならない。
package_update: true
package_upgrade: true
packages:
  - git
  - zsh
  - curl
timezone: Asia/Tokyo
runcmd:
  # Tailscale 参加（inbound 全閉じでも outbound だけで成立する）
  - ['sh', '-c', 'curl -fsSL https://tailscale.com/install.sh | sh']
  - ['tailscale', 'up', '--authkey={{TAILSCALE_AUTH_KEY}}', '--ssh']
  # dotfiles 取得（bootstrap は初回 SSH 後に手動実行する）
  - ['sudo', '-u', 'ubuntu', 'git', 'clone', 'https://github.com/cmb-sy/dotfiles.git', '/home/ubuntu/dotfiles']
final_message: "cloud-init done. Connect via: tailscale ssh ubuntu@<hostname>"
