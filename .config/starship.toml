add_newline = false

format = """
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$python\
$aws\
$gcloud\
$kubernetes\
$docker_context\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$battery\
$status\
$os\
$container\
$shell\
$character"""

right_format = """$time"""

[character]
error_symbol = "[❯](bold red)"
success_symbol = "[❯](bold green)"

[directory]
truncation_length = 100
truncate_to_repo = false
truncation_symbol = "…/"

[python]
format = '/ [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[aws]
format = '/ [$symbol ($profile) (\($region\) )]($style) '
symbol = "󰸏"
disabled = false

[gcloud]
format = '/ [$symbol $account(@$domain) (\($project\))]($style) '
symbol = "󱇶"
disabled = false

[kubernetes]
format = '/ [$symbol $cluster \($namespace\)](dimmed green) '
symbol = "󱃾 "
disabled = false

[docker_context]
format = "/ [$symbol$context]($style) "

[time]
disabled = false
time_format = "%H:%M"
format = "[ 󰥔 $time ]($style)"
style = "bold fg:#FFFFFF bg:#2B3348"

[git_branch]
symbol = " "
