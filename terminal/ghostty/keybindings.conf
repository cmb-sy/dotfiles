# Ghostty keybindings (see KEYBINDINGS.md for WezTerm-aligned shortcuts)
# Loaded from main config via: config-file = keybindings.conf

# Quick Terminal
keybind = global:super+grave_accent=toggle_quick_terminal
quick-terminal-position = top
quick-terminal-autohide = true

# Tabs
keybind = super+left=previous_tab
keybind = super+right=next_tab
keybind = super+t=new_tab

# Pane splits (Cmd+Shift+- vertical / Cmd+Shift+\ horizontal)
keybind = super+shift+Minus=new_split:right
keybind = super+shift+Backslash=new_split:down

# Pane navigation (Cmd+Shift+arrow)
keybind = super+shift+left=goto_split:left
keybind = super+shift+right=goto_split:right
keybind = super+shift+up=goto_split:up
keybind = super+shift+down=goto_split:down

# Search (Cmd+F = built-in / Cmd+Shift+F = CSI 24;3~ (alt+F12) for zsh fzf_cd_global)
# herdr forwards only F1..F12 chords to panes and drops F13+ (CSI 25~),
# so the trigger must stay within the F12 range to work inside herdr too
keybind = super+f=start_search
keybind = super+shift+f=csi:24;3~

# herdr tab/space switching (chords consumed by herdr [keys] bindings;
# in plain panes zsh maps them to no-ops via .function.zsh)
keybind = super+shift+left_bracket=csi:23;2~
keybind = super+shift+right_bracket=csi:24;2~
keybind = super+alt+up=csi:23;5~
keybind = super+alt+down=csi:24;5~

# Fullscreen (uses macos-non-native-fullscreen from main config)
keybind = super+ctrl+f=toggle_fullscreen

# Send newline (Claude Code, etc.)
keybind = shift+enter=text:\n
