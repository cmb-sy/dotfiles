# Ghostty キーバインド（WezTerm と揃えているものは KEYBINDINGS.md 参照）
# メイン config から config-file = keybindings.conf で読み込まれる

# Quick Terminal
keybind = global:super+grave_accent=toggle_quick_terminal
quick-terminal-position = top
quick-terminal-autohide = true

# タブ
keybind = super+left=previous_tab
keybind = super+right=next_tab
keybind = super+t=new_tab

# ペイン分割（Cmd+Shift+- で縦分割 / Cmd+Shift+| で横分割）
keybind = super+shift+Minus=new_split:right
keybind = super+shift+Backslash=new_split:down

# 検索（Cmd+F = 内蔵検索 / Cmd+Shift+F = WezTerm と同じシーケンス送信）
keybind = super+f=start_search
keybind = super+shift+f=text:\x1b[25~

# Fullscreen（設定値 macos-non-native-fullscreen を使って切り替え）
keybind = super+ctrl+f=toggle_fullscreen

# 改行送信（Claude Code 等）
keybind = shift+enter=text:\n
# プロンプト間ジャンプ
keybind = super+shift+up=jump_to_prompt:-1
keybind = super+shift+down=jump_to_prompt:1
